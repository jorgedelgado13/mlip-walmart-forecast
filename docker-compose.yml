services:
  trainer:
    image: mlip-walmart-forecast-trainer:latest
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: walmart-trainer
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - WANDB_PROJECT=mlip-walmart-forecast
      - WANDB_MODE=offline

  app:
    image: mlip-walmart-forecast-app:latest
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: walmart-flask-app
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - trainer

  prometheus:
    image: prom/prometheus:latest
    container_name: walmart-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app

  grafana:
    image: grafana/grafana-oss:latest
    container_name: walmart-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana_data: