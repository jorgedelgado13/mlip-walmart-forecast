name: CI - MLIP Walmart Forecast

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  python-pipeline:
    runs-on: ubuntu-latest
    env:
      WANDB_MODE: offline
      WANDB_PROJECT: mlip-walmart-forecast

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements_bootstrap.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_bootstrap.txt

      - name: Run data preparation
        run: python src/data_prep.py

      - name: Run statistical training
        run: python src/train_stats.py

      - name: Run statistical evaluation
        run: python src/evaluate.py

      - name: Run ML probabilistic training
        run: python src/train_ml.py

      - name: Run ML probabilistic evaluation
        run: python src/evaluate_ml.py

      - name: Run inventory simulation
        run: python src/inventory.py

      - name: Run consolidated evaluation
        run: python src/evaluate_all.py

      - name: Run W&B offline logging
        run: python src/log_wandb.py

      - name: Smoke test Flask app routes
        run: |
          python -c "import app.app as m; print(m.app.url_map)"

      - name: Upload model and evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlip-walmart-artifacts
          path: |
            data/processed/walmart_processed.csv
            models/mlforecast_model.joblib
            models/ml_metadata.joblib
            models/ml_training_info.json
            models/evaluation_metrics.csv
            models/evaluation_ml_metrics.csv
            models/final_model_comparison.csv
            models/final_evaluation_summary.csv
            models/plot_wape_comparison.png
            models/plot_inventory_kpis.png
            models/inventory_simulation_summary.csv
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    needs: python-pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build trainer image
        run: docker build -f Dockerfile.train -t mlip-walmart-forecast-trainer:ci .

      - name: Build app image
        run: docker build -f Dockerfile.app -t mlip-walmart-forecast-app:ci .